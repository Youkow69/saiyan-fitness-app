<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="auraBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="85%" stop-color="#0a0f1a"/>
      <stop offset="95%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </radialGradient>
    <radialGradient id="dbBall" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FF6600"/>
    </radialGradient>
  </defs>

  <!-- Outer ki aura glow -->
  <circle cx="256" cy="256" r="252" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.3"/>
  <circle cx="256" cy="256" r="248" fill="none" stroke="#FF8C00" stroke-width="1" opacity="0.2"/>

  <!-- Main background circle -->
  <circle cx="256" cy="256" r="245" fill="url(#auraBg)"/>

  <!-- Ki energy lines radiating outward -->
  <g stroke="#FFD700" stroke-width="2" opacity="0.4" stroke-linecap="round">
    <line x1="256" y1="30" x2="256" y2="55"/>
    <line x1="256" y1="457" x2="256" y2="482"/>
    <line x1="30" y1="256" x2="55" y2="256"/>
    <line x1="457" y1="256" x2="482" y2="256"/>
    <line x1="96" y1="96" x2="114" y2="114"/>
    <line x1="398" y1="398" x2="416" y2="416"/>
    <line x1="416" y1="96" x2="398" y2="114"/>
    <line x1="96" y1="416" x2="114" y2="398"/>
  </g>
  <g stroke="#FF8C00" stroke-width="1.5" opacity="0.25" stroke-linecap="round">
    <line x1="160" y1="45" x2="170" y2="68"/>
    <line x1="352" y1="45" x2="342" y2="68"/>
    <line x1="45" y1="160" x2="68" y2="170"/>
    <line x1="45" y1="352" x2="68" y2="342"/>
    <line x1="467" y1="160" x2="444" y2="170"/>
    <line x1="467" y1="352" x2="444" y2="342"/>
    <line x1="160" y1="467" x2="170" y2="444"/>
    <line x1="352" y1="467" x2="342" y2="444"/>
  </g>

  <!-- 4-Star Dragon Ball behind dumbbell -->
  <circle cx="256" cy="240" r="85" fill="url(#dbBall)" stroke="#CC5500" stroke-width="2"/>
  <!-- Dragon Ball shine -->
  <ellipse cx="230" cy="210" rx="25" ry="15" fill="white" opacity="0.2" transform="rotate(-30 230 210)"/>
  <!-- 4 stars in diamond arrangement -->
  <circle cx="256" cy="210" r="8" fill="#CC0000"/>
  <circle cx="236" cy="240" r="8" fill="#CC0000"/>
  <circle cx="276" cy="240" r="8" fill="#CC0000"/>
  <circle cx="256" cy="270" r="8" fill="#CC0000"/>

  <!-- Dumbbell - bar -->
  <rect x="130" y="290" width="252" height="18" rx="9" fill="#FFD700"/>
  <!-- Dumbbell - left inner weight -->
  <rect x="120" y="268" width="36" height="62" rx="6" fill="#FFD700"/>
  <!-- Dumbbell - left outer weight -->
  <rect x="100" y="258" width="28" height="82" rx="5" fill="#E6C200"/>
  <!-- Dumbbell - right inner weight -->
  <rect x="356" y="268" width="36" height="62" rx="6" fill="#FFD700"/>
  <!-- Dumbbell - right outer weight -->
  <rect x="384" y="258" width="28" height="82" rx="5" fill="#E6C200"/>

  <!-- Dumbbell shadow/depth lines -->
  <rect x="100" y="258" width="28" height="82" rx="5" fill="none" stroke="#B8960F" stroke-width="1.5"/>
  <rect x="384" y="258" width="28" height="82" rx="5" fill="none" stroke="#B8960F" stroke-width="1.5"/>

  <!-- Small ki sparks around dumbbell -->
  <circle cx="80" cy="300" r="3" fill="#FFD700" opacity="0.6"/>
  <circle cx="432" cy="300" r="3" fill="#FFD700" opacity="0.6"/>
  <circle cx="256" cy="360" r="2.5" fill="#FF8C00" opacity="0.5"/>
  <circle cx="180" cy="190" r="2" fill="#FFD700" opacity="0.4"/>
  <circle cx="340" cy="185" r="2" fill="#FFD700" opacity="0.4"/>
</svg>
